name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  pytest:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - name: Install and run tests with coverage
        run: |
          pip install -e . pytest pytest-cov
          if [ -d tests ]; then
            python3 -m pytest tests/ -q --cov=cli_anything --cov-report=term-missing --cov-report=xml
          elif [ -d cli_anything ]; then
            python3 -m pytest cli_anything/ -q --cov=cli_anything --cov-report=term-missing --cov-report=xml
          else
            echo "No tests found"
          fi
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  ruff:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - name: Install ruff and lint
        run: |
          pip install ruff
          ruff check cli_anything/ --output-format=github || true
          ruff check cli_anything/ --output-format=json -o ruff.json || true
      - name: Upload ruff artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ruff-report
          path: ruff.json

  bandit:
    name: Bandit Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install bandit and scan
        run: |
          pip install bandit
          if [ -d cli_anything ]; then
            bandit -r cli_anything/ -f json -o bandit.json || true
          else
            bandit -r . -f json -o bandit.json || true
          fi
      - name: Convert bandit JSON to SARIF
        run: |
          python3 -c "
          import json
          with open('bandit.json') as f:
              data = json.load(f)
          seen_rules = set()
          rules = []
          results = []
          for r in data.get('results', []):
              rid = r.get('test_id', 'unknown')
              if rid not in seen_rules:
                  seen_rules.add(rid)
                  rules.append({
                      'id': rid,
                      'shortDescription': {'text': r.get('test_name', rid)},
                      'fullDescription': {'text': r.get('test_description', '')},
                      'helpUri': r.get('issue_cwe', {}).get('link', '')
                  })
              sev = r.get('issue_severity', 'LOW')
              level = 'error' if sev in ('HIGH', 'MEDIUM') else 'warning'
              results.append({
                  'ruleId': rid,
                  'level': level,
                  'message': {'text': r.get('issue_text', '')},
                  'locations': [{
                      'physicalLocation': {
                          'artifactLocation': {'uri': r.get('filename', 'unknown')},
                          'region': {'startLine': r.get('line_number', 0)}
                      }
                  }]
              })
          sarif = {
              'version': '2.1.0',
              'runs': [{
                  'tool': {'driver': {'name': 'Bandit', 'rules': rules}},
                  'results': results
              }]
          }
          with open('bandit.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)
          print(f'Converted {len(results)} bandit findings to SARIF')
          "
      - name: Upload bandit SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit.sarif
          category: bandit
      - name: Upload bandit SARIF artifact
        uses: actions/upload-artifact@v7
        with:
          name: bandit-sarif
          path: bandit.sarif

  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install semgrep and scan
        run: |
          pip install semgrep
          if [ -d cli_anything ]; then
            semgrep scan --config p/python --sarif --output semgrep.sarif cli_anything/ || true
          else
            semgrep scan --config p/python --sarif --output semgrep.sarif . || true
          fi
      - name: Upload semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
      - name: Upload semgrep SARIF artifact
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-sarif
          path: semgrep.sarif

  pip-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - name: Install pip-audit and scan dependencies
        run: |
          pip install -e . pip-audit
          pip-audit -f json -o pip-audit.json || true
      - name: Convert pip-audit JSON to SARIF
        run: |
          python3 -c "
          import json
          with open('pip-audit.json') as f:
              data = json.load(f)
          rules = []
          results = []
          seen = set()
          for dep in data.get('dependencies', []):
              for vuln in dep.get('vulns', []):
                  vid = vuln.get('id', 'unknown')
                  if vid not in seen:
                      seen.add(vid)
                      rules.append({
                          'id': vid,
                          'shortDescription': {'text': vuln.get('description', '')[:200]},
                      })
                  results.append({
                      'ruleId': vid,
                      'level': 'error',
                      'message': {'text': f\"{dep.get('name','?')} {dep.get('version','?')}: {vuln.get('description','')[:300]}\"},
                      'locations': [{
                          'physicalLocation': {
                              'artifactLocation': {'uri': 'setup.py'},
                              'region': {'startLine': 1}
                          }
                      }]
                  })
          sarif = {
              'version': '2.1.0',
              'runs': [{
                  'tool': {'driver': {'name': 'pip-audit', 'rules': rules}},
                  'results': results
              }]
          }
          with open('pip-audit.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)
          print(f'Converted {len(results)} pip-audit findings to SARIF')
          "
      - name: Upload pip-audit SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: pip-audit.sarif
          category: pip-audit
      - name: Upload pip-audit artifact
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-report
          path: pip-audit.json

  findings-summary:
    name: Findings Summary
    runs-on: ubuntu-latest
    needs: [bandit, semgrep, pip-audit, ruff, pytest]
    steps:
      - uses: actions/checkout@v7
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "*-sarif"
          merge-multiple: true
      - name: Download ruff report
        uses: actions/download-artifact@v8
        with:
          name: ruff-report
      - name: Download coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
      - name: Generate findings summary and update issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os, glob, subprocess
          from datetime import datetime, timezone

          scan_date = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          def parse_sarif(filepath):
              findings = []
              if not os.path.exists(filepath):
                  return findings
              with open(filepath) as f:
                  try:
                      data = json.load(f)
                  except json.JSONDecodeError:
                      return findings
              for run in data.get("runs", []):
                  rules = {}
                  for rule in run.get("tool", {}).get("driver", {}).get("rules", []):
                      rules[rule.get("id", "")] = rule
                  for result in run.get("results", []):
                      rule_id = result.get("ruleId", "unknown")
                      level = result.get("level", "warning")
                      message = result.get("message", {}).get("text", "")
                      desc = rules.get(rule_id, {}).get("shortDescription", {}).get("text", message)
                      for loc in result.get("locations", []):
                          phys = loc.get("physicalLocation", {})
                          artifact = phys.get("artifactLocation", {}).get("uri", "unknown")
                          region = phys.get("region", {})
                          line = region.get("startLine", 0)
                          findings.append({
                              "rule_id": rule_id,
                              "level": level,
                              "message": message,
                              "file": artifact,
                              "line": line,
                              "description": desc
                          })
              return findings

          def parse_ruff(filepath):
              findings = []
              if not os.path.exists(filepath):
                  return findings
              with open(filepath) as f:
                  try:
                      data = json.load(f)
                  except json.JSONDecodeError:
                      return findings
              for item in data:
                  findings.append({
                      "rule_id": item.get("code", "ruff"),
                      "level": "warning",
                      "message": item.get("message", ""),
                      "file": item.get("filename", "unknown"),
                      "line": item.get("location", {}).get("row", 0),
                      "description": item.get("code", "ruff lint")
                  })
              return findings

          def parse_coverage(filepath):
              """Extract coverage summary."""
              if not os.path.exists(filepath):
                  return None
              try:
                  import xml.etree.ElementTree as ET
                  tree = ET.parse(filepath)
                  root = tree.getroot()
                  return {
                      "line_rate": float(root.get("line-rate", 0)),
                      "branch_rate": float(root.get("branch-rate", 0)),
                      "lines_covered": int(root.get("lines-covered", 0)),
                      "lines_valid": int(root.get("lines-valid", 0)),
                  }
              except Exception:
                  return None

          all_findings = []
          for f in glob.glob("*.sarif"):
              all_findings.extend(parse_sarif(f))
          all_findings.extend(parse_ruff("ruff.json"))

          cov = parse_coverage("coverage.xml")
          cov_str = ""
          if cov:
              pct = cov["line_rate"] * 100
              cov_str = f"\n\n**Coverage:** {pct:.1f}% ({cov['lines_covered']}/{cov['lines_valid']} lines)"

          if not all_findings:
              body = f"\u2705 No security findings \u2014 last scan: {scan_date}{cov_str}"
          else:
              max_findings = 200
              truncated = len(all_findings) > max_findings
              shown = all_findings[:max_findings]
              body = f"Last scan: {scan_date}{cov_str}\n\n"
              if truncated:
                  body += f"Showing top {max_findings} of {len(all_findings)} "
                  body += "findings (sorted by severity).\n\n"
              body += f"```json\n{json.dumps(shown, indent=2)}\n```"

          with open("/tmp/findings_body.md", "w") as bf:
              bf.write(body)

          result = subprocess.run(
              ["gh", "issue", "list", "--search", "Security findings - auto-generated",
               "--json", "number", "--limit", "1"],
              capture_output=True, text=True
          )
          issues = json.loads(result.stdout) if result.stdout.strip() else []
          if issues:
              subprocess.run(["gh", "issue", "edit", str(issues[0]["number"]),
                              "--body-file", "/tmp/findings_body.md"])
          else:
              subprocess.run(["gh", "issue", "create",
                              "--title", "\U0001f512 Security findings - auto-generated",
                              "--label", "security-findings",
                              "--body-file", "/tmp/findings_body.md"])
          print(f"Updated findings issue with {len(all_findings)} findings, coverage: {cov_str.strip() if cov_str else 'N/A'}")
          PYEOF