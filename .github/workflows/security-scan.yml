name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  pytest:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install and run tests
        run: |
          pip install -e . pytest
          if [ -d tests ]; then
            python3 -m pytest tests/ -q
          elif [ -d cli_anything ]; then
            python3 -m pytest cli_anything/ -q
          else
            echo "No tests found"
          fi

  bandit:
    name: Bandit Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bandit and scan
        run: |
          pip install bandit
          if [ -d cli_anything ]; then
            bandit -r cli_anything/ -f json -o bandit.json || true
          else
            bandit -r . -f json -o bandit.json || true
          fi
      - name: Convert bandit JSON to SARIF
        run: |
          python3 -c "
          import json
          with open('bandit.json') as f:
              data = json.load(f)
          seen_rules = set()
          rules = []
          results = []
          for r in data.get('results', []):
              rid = r.get('test_id', 'unknown')
              if rid not in seen_rules:
                  seen_rules.add(rid)
                  rules.append({
                      'id': rid,
                      'shortDescription': {'text': r.get('test_name', rid)},
                      'fullDescription': {'text': r.get('test_description', '')},
                      'helpUri': r.get('issue_cwe', {}).get('link', '')
                  })
              sev = r.get('issue_severity', 'LOW')
              level = 'error' if sev in ('HIGH', 'MEDIUM') else 'warning'
              results.append({
                  'ruleId': rid,
                  'level': level,
                  'message': {'text': r.get('issue_text', '')},
                  'locations': [{
                      'physicalLocation': {
                          'artifactLocation': {'uri': r.get('filename', 'unknown')},
                          'region': {'startLine': r.get('line_number', 0)}
                      }
                  }]
              })
          sarif = {
              'version': '2.1.0',
              'runs': [{
                  'tool': {'driver': {'name': 'Bandit', 'rules': rules}},
                  'results': results
              }]
          }
          with open('bandit.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)
          print(f'Converted {len(results)} bandit findings to SARIF')
          "
      - name: Upload bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
          category: bandit
      - name: Upload bandit SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sarif
          path: bandit.sarif

  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install semgrep and scan
        run: |
          pip install semgrep
          if [ -d cli_anything ]; then
            semgrep scan --config p/python --sarif --output semgrep.sarif cli_anything/ || true
          else
            semgrep scan --config p/python --sarif --output semgrep.sarif . || true
          fi
      - name: Upload semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep
      - name: Upload semgrep SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif

  findings-summary:
    name: Findings Summary
    runs-on: ubuntu-latest
    needs: [bandit, semgrep]
    steps:
      - uses: actions/checkout@v4
      - name: Download SARIF artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-sarif"
          merge-multiple: true
      - name: Generate findings summary and update issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os, glob, subprocess
          from datetime import datetime, timezone

          scan_date = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          def parse_sarif(filepath):
              findings = []
              if not os.path.exists(filepath):
                  return findings
              with open(filepath) as f:
                  try:
                      data = json.load(f)
                  except json.JSONDecodeError:
                      return findings
              for run in data.get("runs", []):
                  rules = {}
                  for rule in run.get("tool", {}).get("driver", {}).get("rules", []):
                      rules[rule.get("id", "")] = rule
                  for result in run.get("results", []):
                      rule_id = result.get("ruleId", "unknown")
                      level = result.get("level", "warning")
                      message = result.get("message", {}).get("text", "")
                      desc = rules.get(rule_id, {}).get("shortDescription", {}).get("text", message)
                      for loc in result.get("locations", []):
                          phys = loc.get("physicalLocation", {})
                          artifact = phys.get("artifactLocation", {}).get("uri", "unknown")
                          region = phys.get("region", {})
                          line = region.get("startLine", 0)
                          findings.append({
                              "rule_id": rule_id,
                              "level": level,
                              "message": message,
                              "file": artifact,
                              "line": line,
                              "description": desc
                          })
              return findings

          all_findings = []
          for f in glob.glob("*.sarif"):
              all_findings.extend(parse_sarif(f))

          if not all_findings:
              body = f"\u2705 No security findings \u2014 last scan: {scan_date}"
          else:
              # GitHub issue body limit is 65536 chars. Cap findings to fit.
              max_findings = 200
              truncated = len(all_findings) > max_findings
              shown = all_findings[:max_findings]
              body = f"Last scan: {scan_date}\n\n"
              if truncated:
                  body += f"Showing top {max_findings} of {len(all_findings)} "
                  body += "findings (sorted by severity).\n\n"
              body += f"```json\n{json.dumps(shown, indent=2)}\n```"

          with open("/tmp/findings_body.md", "w") as bf:
              bf.write(body)

          result = subprocess.run(
              ["gh", "issue", "list", "--search", "Security findings - auto-generated",
               "--json", "number", "--limit", "1"],
              capture_output=True, text=True
          )
          issues = json.loads(result.stdout) if result.stdout.strip() else []
          if issues:
              subprocess.run(["gh", "issue", "edit", str(issues[0]["number"]),
                              "--body-file", "/tmp/findings_body.md"])
          else:
              subprocess.run(["gh", "issue", "create",
                              "--title", "\U0001f512 Security findings - auto-generated",
                              "--label", "security-findings",
                              "--body-file", "/tmp/findings_body.md"])
          print(f"Updated findings issue with {len(all_findings)} findings")
          PYEOF