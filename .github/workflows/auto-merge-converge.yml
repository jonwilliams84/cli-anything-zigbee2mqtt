name: Auto-merge converge PRs

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    if: github.event.action != 'closed' && startsWith(github.head_ref, 'converge/auto-')
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash --auto --delete-branch

  rescan-on-merge:
    name: Trigger security rescan
    runs-on: ubuntu-latest
    # GITHUB_TOKEN-driven merges don't cascade into other workflows' `on: push`
    # (GitHub's loop-prevention rule), so the security-findings issue would
    # otherwise stay stale until the next 06:00 UTC scheduled scan. Dispatch
    # security-scan.yml explicitly with a PAT, which isn't subject to that rule.
    if: github.event.action == 'closed' && github.event.pull_request.merged == true && startsWith(github.head_ref, 'converge/auto-')
    steps:
      - name: Dispatch security-scan.yml
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run security-scan.yml \
            --repo ${{ github.repository }} \
            --ref main